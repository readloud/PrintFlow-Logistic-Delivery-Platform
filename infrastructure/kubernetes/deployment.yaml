apiVersion: apps/v1
kind: Deployment
metadata:
  name: printflow-backend
  namespace: printflow
spec:
  replicas: 3
  selector:
    matchLabels:
      app: printflow-backend
  template:
    metadata:
      labels:
        app: printflow-backend
    spec:
      containers:
      - name: backend
        image: 123456789.dkr.ecr.ap-southeast-1.amazonaws.com/printflow-backend:latest
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: jwt-secret
              key: secret
        - name: MIDTRANS_SERVER_KEY
          valueFrom:
            secretKeyRef:
              name: midtrans-secret
              key: server_key
        - name: TWILIO_ACCOUNT_SID
          valueFrom:
            secretKeyRef:
              name: twilio-secret
              key: account_sid
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: printflow-backend-service
  namespace: printflow
spec:
  selector:
    app: printflow-backend
  ports:
  - port: 80
    targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: printflow-ingress
  namespace: printflow
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
  - hosts:
    - api.printflow.com
    secretName: printflow-tls
  rules:
  - host: api.printflow.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: printflow-backend-service
            port:
              number: 80