server {
    listen 80;
    server_name printflow.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name printflow.com;
    
    ssl_certificate /etc/letsencrypt/live/printflow.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/printflow.com/privkey.pem;
    
    # Frontend
    location / {
        root /var/www/printflow/frontend-web/dist;
        try_files $uri $uri/ /index.html;
    }
    
    # Backend API
    location /api {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # WebSocket
    location /socket.io {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
    
    # Uploads
    location /uploads {
        alias /var/www/printflow/backend/uploads;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}